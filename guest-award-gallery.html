<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMARTCONVO — Award Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400&family=Syne:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --accent: #00e5b4;
  --bg: #06080b;
  --fg: #e8eaf0;
  --dim: rgba(255,255,255,0.55);
  --line: rgba(255,255,255,0.08);
  --card: rgba(255,255,255,0.03);
}
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--fg); font-family: 'Syne', sans-serif; min-height: 100vh; overflow-y:auto; }

.layout { display: flex; min-height: calc(100vh - 64px); }
.sidebar {
  width: 260px;
  flex-shrink: 0;
  border-right: 1px solid var(--line);
  background: rgba(255,255,255,0.01);
  padding: 28px 18px;
  position: sticky;
  top: 64px;
  height: calc(100vh - 64px);
  overflow-y: auto;
}
.main { flex: 1; min-height: 100vh; overflow-y: auto; }

body::before {
  content:''; position:fixed; inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity:0.025; pointer-events:none; z-index:9999;
}

/* NAV */
nav {
  position: sticky; top:0; z-index:100;
  background: rgba(6,8,11,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--line);
  padding: 0 32px;
  display: flex; align-items: center; justify-content: space-between;
  height: 64px;
  animation: fadeDown 0.6s ease both;
}
.nav-brand { display:flex; align-items:center; gap:10px; }
.nav-brand svg { width:24px; height:24px; color: var(--accent); }
.nav-brand span { font-family:'Bebas Neue'; font-size:1.3rem; letter-spacing:5px; }
.nav-right { display:flex; align-items:center; gap:16px; }
.nav-user { font-family:'DM Mono'; font-size:0.7rem; letter-spacing:1px; color: var(--dim); }
.nav-logout { background:none; border:1px solid var(--line); border-radius:6px; padding:6px 14px; color:rgba(255,255,255,0.4); font-family:'DM Mono'; font-size:0.68rem; letter-spacing:2px; cursor:pointer; transition:all 0.3s; }
.nav-logout:hover { border-color:var(--accent); color:var(--accent); }

.nav-profile {
  display:flex; align-items:center; gap:10px;
  background: rgba(0,229,180,0.10);
  border: 1px solid rgba(0,229,180,0.35);
  color: var(--accent);
  border-radius: 8px;
  padding: 6px 14px;
  text-decoration:none;
  transition: all 0.3s;
  font-family:'DM Mono';
  font-size:0.7rem;
  letter-spacing:2px;
}
.nav-profile:hover { background: rgba(0,229,180,0.18); transform: translateY(-1px); }
.nav-profile-dot { width:7px; height:7px; border-radius:50%; background: var(--accent); box-shadow: 0 0 0 6px rgba(0,229,180,0.08); }

/* Sidebar */
.sb-brand { display:flex; align-items:center; gap:12px; margin-bottom:24px; padding: 0 8px; }
.sb-brand-dot { width:10px; height:10px; border-radius:50%; background: var(--accent); box-shadow: 0 0 0 6px rgba(0,229,180,0.08); }
.sb-brand-title { font-family:'Bebas Neue'; letter-spacing:4px; font-size:1.4rem; color: rgba(255,255,255,0.65); }

.sb-section { display:flex; flex-direction: column; gap:10px; padding: 0 8px; }
.sb-link {
  width:100%;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.02);
  color: var(--fg);
  border-radius: 12px;
  padding: 12px 12px;
  cursor:pointer;
  display:flex; align-items:center; gap:12px;
  transition: all 0.3s;
}
.sb-link:hover { border-color: rgba(0,229,180,0.35); background: rgba(0,229,180,0.06); transform: translateX(4px); }
.sb-icon { width:28px; height:28px; border-radius:10px; display:flex; align-items:center; justify-content:center; background: rgba(0,229,180,0.08); color: var(--accent); font-family:'DM Mono'; font-size:0.85rem; }
.sb-text { font-family:'DM Mono'; font-size:0.75rem; letter-spacing:1px; color: rgba(255,255,255,0.72); }

.sb-footer { margin-top: 28px; border-top: 1px solid var(--line); padding-top: 18px; padding-left: 8px; padding-right: 8px; }
.sb-footer-label { font-family:'DM Mono'; font-size:0.62rem; letter-spacing:2px; color: rgba(255,255,255,0.35); margin-bottom:8px; }
.sb-footer-name { font-family:'Bebas Neue'; font-size:1.15rem; letter-spacing:3px; color: var(--accent); }

@media (max-width: 900px) {
  .layout { flex-direction: column; }
  .sidebar { width: 100%; position: relative; top: auto; height: auto; border-right: none; border-bottom: 1px solid var(--line); }
  .main { min-height: auto; }
}

/* Header */
.page-header {
  padding: 100px 32px 30px;
  max-width: 1200px;
  margin: 0 auto;
  text-align: center;
}
.page-header-eyebrow { font-family:'DM Mono'; font-size:0.72rem; letter-spacing:4px; color:var(--accent); margin-bottom:18px; animation: fadeUp 0.6s 0.1s ease both; }
.page-header-title { font-family:'Bebas Neue'; font-size:clamp(3.1rem,7vw,5.2rem); letter-spacing:4px; line-height:0.95; margin-bottom:18px; animation: fadeUp 0.6s 0.2s ease both; }
.page-header-title span { color: var(--accent); }
.page-header-sub { font-size:1rem; color:var(--dim); max-width:680px; margin:0 auto; line-height:1.8; animation: fadeUp 0.6s 0.3s ease both; }

/* Gallery */
.section { padding: 0 32px 80px; max-width:1200px; margin:0 auto; }
.gallery-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap:16px; }

.gal-card {
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  overflow:hidden;
  transition: all 0.3s;
  animation: fadeUp 0.5s ease both;
  cursor: pointer;
}
.gal-card:hover {
  border-color: rgba(0,229,180,0.35);
  transform: translateY(-3px);
  background: rgba(0,229,180,0.06);
}

.gal-thumb {
  height: 150px;
  background:
    radial-gradient(circle at top left, rgba(0,229,180,0.18), transparent 55%),
    linear-gradient(135deg, rgba(43,43,255,0.12), rgba(255,255,255,0.02));
  display:flex;
  align-items:flex-end;
  padding: 14px;
}
.gal-thumb span {
  font-family:'DM Mono';
  font-size:0.65rem;
  letter-spacing:2px;
  color: rgba(255,255,255,0.7);
  border: 1px solid rgba(255,255,255,0.10);
  background: rgba(255,255,255,0.03);
  padding: 6px 10px;
  border-radius: 100px;
}

.gal-body { padding: 14px; }
.gal-title { font-family:'Syne'; font-weight:700; font-size:0.95rem; margin-bottom:6px; }
.gal-desc { font-family:'DM Mono'; font-size:0.68rem; letter-spacing:1px; color: rgba(255,255,255,0.45); line-height:1.7; }

/* Modal */
.modal {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.65);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  padding: 18px;
}
.modal.open { display:flex; }
.modal-inner {
  width: min(920px, 100%);
  background: rgba(6,8,11,0.92);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 14px;
  overflow:hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}
.modal-top {
  display:flex;
  align-items:center;
  justify-content: space-between;
  padding: 14px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.modal-title {
  font-family:'Bebas Neue';
  letter-spacing:4px;
  font-size:1.2rem;
}
.modal-close {
  background:none;
  border:1px solid rgba(255,255,255,0.10);
  color: rgba(255,255,255,0.7);
  border-radius: 10px;
  padding: 8px 12px;
  cursor:pointer;
  font-family:'DM Mono';
  letter-spacing:2px;
}
.modal-close:hover { border-color: var(--accent); color: var(--accent); }

.modal-content {
  padding: 16px;
  display:grid;
  grid-template-columns: 1.4fr 1fr;
  gap: 16px;
}
@media (max-width: 900px) { .modal-content { grid-template-columns: 1fr; } }

.modal-hero {
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  overflow:hidden;
  height: 320px;
  background:
    radial-gradient(circle at top left, rgba(0,229,180,0.18), transparent 55%),
    linear-gradient(135deg, rgba(43,43,255,0.12), rgba(255,255,255,0.02));
  display:flex;
  align-items:flex-end;
  padding: 16px;
}
.modal-hero .pill {
  border:1px solid rgba(255,255,255,0.10);
  background: rgba(255,255,255,0.03);
  color: rgba(255,255,255,0.75);
  border-radius: 100px;
  padding: 8px 12px;
  font-family:'DM Mono';
  letter-spacing:2px;
  font-size:0.68rem;
}

.modal-info {
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 14px;
  background: rgba(255,255,255,0.02);
}
.modal-info .k { font-family:'DM Mono'; font-size:0.62rem; letter-spacing:2px; color: rgba(255,255,255,0.35); margin-bottom:8px; }
.modal-info .v { font-family:'Syne'; font-weight:700; font-size:1.05rem; margin-bottom:10px; }
.modal-info .p { font-family:'DM Mono'; font-size:0.68rem; letter-spacing:1px; color: rgba(255,255,255,0.45); line-height:1.8; }

footer { border-top:1px solid var(--line); padding:40px 32px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px; max-width:1200px; margin:0 auto; }
.footer-brand { display:flex; align-items:center; gap:10px; }
.footer-brand svg { width:20px; height:20px; color:var(--accent); }
.footer-brand span { font-family:'Bebas Neue'; font-size:1.1rem; letter-spacing:5px; color:rgba(255,255,255,0.6); }
.footer-copy { font-family:'DM Mono'; font-size:0.65rem; letter-spacing:1px; color:rgba(255,255,255,0.25); }

/* Animations */
@keyframes fadeUp   { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeDown { from{opacity:0;transform:translateY(-16px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<nav>
  <div class="nav-brand">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="8" r="6"/><path d="M8.21 13.89L7 23l5-3 5 3-1.21-9.12"/>
    </svg>
    <span>SMARTCONVO</span>
  </div>

  <div class="nav-right">
    <a class="nav-profile" href="guestprofile.html" aria-label="Go to profile">
      <span class="nav-profile-dot" aria-hidden="true"></span>
      <span id="nav-profile-text">PROFILE</span>
    </a>

    <span class="nav-user" id="nav-user">—</span>
    <button class="nav-logout" onclick="logout()">Sign Out</button>
  </div>
</nav>

<div class="layout">
  <aside class="sidebar" aria-label="Sidebar Menu">
    <div class="sb-brand">
      <div class="sb-brand-dot" aria-hidden="true"></div>
      <div class="sb-brand-title">Menu</div>
    </div>

     <div class="sb-section">
      <button class="sb-link" type="button" onclick="window.location.href='guest.html'">
        <span class="sb-icon" aria-hidden="true">⌂</span>
        <span class="sb-text">Guest Portal</span>
      </button>

<button class="sb-link" type="button" onclick="window.location.href='guest-graduate-status.html'">
  <span class="sb-icon" aria-hidden="true">✓</span>
  <span class="sb-text">Graduate Status</span>
</button>

<button class="sb-link" type="button" onclick="window.location.href='guestvote.html'">
  <span class="sb-icon" aria-hidden="true">🗳️</span>
  <span class="sb-text">Graduate Voting</span>
</button>

      <button class="sb-link" type="button" onclick="window.location.href='guest-hall-live.html'">
        <span class="sb-icon" aria-hidden="true">◷</span>
        <span class="sb-text">Hall Live</span>
      </button>

      <button class="sb-link" type="button" onclick="window.location.href='guest-award-gallery.html'"style="border-color: rgba(0,229,180,0.35); background: rgba(0,229,180,0.06);">
        <span class="sb-icon" aria-hidden="true">★</span>
        <span class="sb-text">Award Gallery</span>
      </button>

      <button class="sb-link" type="button" onclick="window.location.href='guest-live-announcement.html'">
        <span class="sb-icon" aria-hidden="true">!</span>
        <span class="sb-text">Announcements</span>
      </button>

            <button class="sb-link" type="button" onclick="window.location.href='guestprofile.html'">
        <span class="sb-icon" aria-hidden="true">☺</span>
        <span class="sb-text">My Profile</span>
      </button> 
    </div>

    <div class="sb-footer">
      <div class="sb-footer-label">Logged in as</div>
      <div class="sb-footer-name" id="sb-footer-name">—</div>
    </div>
  </aside>

  <main class="main">
    <header class="page-header">
      <div class="page-header-eyebrow">Awards Collection</div>
      <h1 class="page-header-title">Award <span>Gallery</span></h1>
      <p class="page-header-sub">Browse highlights of award categories and featured moments. (Placeholder UI — replace with your images/data.)</p>
    </header>

    <section class="section">
      <div class="gallery-grid" id="gallery-grid"></div>
    </section>

    <footer>
      <div class="footer-brand">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="6"/><path d="M8.21 13.89L7 23l5-3 5 3-1.21-9.12"/>
        </svg>
        <span>SMARTCONVO</span>
      </div>
      <span class="footer-copy">© 2026 Dean's Award Ceremony. All rights reserved.</span>
    </footer>
  </main>
</div>

<!-- Modal -->
<div class="modal" id="modal" aria-hidden="true">
  <div class="modal-inner" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-top">
      <div class="modal-title" id="modal-title">Award Moment</div>
      <button class="modal-close" type="button" onclick="closeModal()">CLOSE</button>
    </div>
    <div class="modal-content">
      <div class="modal-hero">
        <div class="pill" id="modal-pill">CATEGORY</div>
      </div>
      <div class="modal-info">
        <div class="k">Description</div>
        <div class="v" id="modal-v">—</div>
        <div class="p" id="modal-p">—</div>
      </div>
    </div>
  </div>
</div>

<script>
function logout() { localStorage.clear(); window.location.href = 'index.html'; }

const storedUserName = localStorage.getItem('userName');
let smartconvoUserName = null;
try {
  const raw = localStorage.getItem('smartconvo_user');
  if (raw) {
    const parsed = JSON.parse(raw);
    smartconvoUserName = parsed?.name || parsed?.email || null;
  }
} catch (e) {}

const userName = storedUserName || smartconvoUserName || 'Guest';
document.getElementById('nav-user').textContent = userName;
document.getElementById('sb-footer-name').textContent = userName;

const gallery = [
  { tag:'Overall', title:'Best Overall Student Award', desc:'A moment of recognition for outstanding achievement.' },
  { tag:'Academics', title:'Academic Excellence Award', desc:'Celebrating consistent academic performance.' },
  { tag:"Dean's List", title:"Dean's List Award", desc:'Honouring students who maintain top results each semester.' },
  { tag:'Leadership', title:'Outstanding Leadership Award', desc:'Recognising influence, initiative, and positive impact.' },
  { tag:'Innovation', title:'Innovation & Research Award', desc:'Supporting creative thinking and valuable research contributions.' },
  { tag:'Sports', title:'Sportsman & Sportswoman of the Year', desc:'Celebrating dedication, discipline, and sporting achievements.' },
];

const grid = document.getElementById('gallery-grid');
gallery.forEach((g, i) => {
  grid.innerHTML += `
    <div class="gal-card" style="animation-delay:${i*0.06}s" onclick="openModal(${i})">
      <div class="gal-thumb"><span>${g.tag}</span></div>
      <div class="gal-body">
        <div class="gal-title">${g.title}</div>
        <div class="gal-desc">${g.desc}</div>
      </div>
    </div>`;
});

const modal = document.getElementById('modal');
const modalTitle = document.getElementById('modal-title');
const modalPill = document.getElementById('modal-pill');
const modalV = document.getElementById('modal-v');
const modalDesc = document.getElementById('modal-p');

function openModal(i) {
  const g = gallery[i];
  modalTitle.textContent = g.title;
  modalPill.textContent = g.tag;
  modalV.textContent = g.title;
  modalDesc.textContent = g.desc;
  modal.classList.add('open');
  modal.setAttribute('aria-hidden','false');
}

function closeModal() {
  modal.classList.remove('open');
  modal.setAttribute('aria-hidden','true');
}

// close when clicking outside
modal.addEventListener('click', (e) => {
  if (e.target === modal) closeModal();
});
</script>
</body>
</html>
